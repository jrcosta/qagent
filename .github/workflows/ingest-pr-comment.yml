name: Ingest PR comment memory

on:
  repository_dispatch:
    types: [pr_comment_created]

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout qagent
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run memory ingest
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          LLM_PROVIDER: groq
          LLM_MODEL: ${{ vars.LLM_MODEL || 'openai/gpt-4.1-mini' }}
          LLM_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LLM_TEMPERATURE: "0"
        run: python .github/scripts/ingest_comment.py

      - name: Commit memories DB
        env:
          PR_NUMBER: ${{ github.event.client_payload.pr_number }}
          PR_REPO: ${{ github.event.client_payload.repo }}
        run: |
          git config user.name "qagent[bot]"
          git config user.email "qagent[bot]@users.noreply.github.com"
          git add data/lancedb/ || true
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: update memories from PR #${PR_NUMBER} (${PR_REPO})"
          git push origin main
