name: QA Agent Review

on:
  repository_dispatch:
    types: [analyze_target_repo]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  qa-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'repository_dispatch'

    steps:

      - name: Debug payload
        run: |
          echo "target_owner=${{ github.event.client_payload.target_owner }}"
          echo "target_repo=${{ github.event.client_payload.target_repo }}"
          echo "target_ref=${{ github.event.client_payload.target_ref }}"
          echo "target_branch=${{ github.event.client_payload.target_branch }}"
          echo "base_sha=${{ github.event.client_payload.base_sha }}"
          echo "head_sha=${{ github.event.client_payload.head_sha }}"

      - name: Checkout do repo do agente
        uses: actions/checkout@v4
        with:
          path: agent
          fetch-depth: 0

      - name: Checkout do repo alvo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.target_owner }}/${{ github.event.client_payload.target_repo }}
          ref: ${{ github.event.client_payload.target_ref }}
          path: target
          fetch-depth: 0
          token: ${{ secrets.TARGET_REPO_PAT }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências do agente
        run: |
          python -m pip install --upgrade pip
          pip install -r agent/requirements.txt

      - name: Criar arquivo .env do agente
        run: |
          echo "LLM_PROVIDER=groq" >> agent/.env
          echo "LLM_MODEL=gpt-4o-mini" >> agent/.env
          echo "LLM_API_KEY=${{ secrets.GROQ_API_KEY }}" >> agent/.env
          echo "LLM_TEMPERATURE=0" >> agent/.env

      - name: Executar QAgent contra o repo alvo
        run: |
          cd agent
          python -m src.main \
            --repo-path ../target \
            --output-file ../target/outputs/analysis.md \
            --base-sha "${{ github.event.client_payload.base_sha }}" \
            --head-sha "${{ github.event.client_payload.head_sha }}"

      - name: Mostrar relatório gerado
        run: |
          cat target/outputs/analysis.md || true

      - name: Publicar relatório como artifact
        uses: actions/upload-artifact@v4
        with:
          name: qa-analysis
          path: target/outputs/analysis.md
          retention-days: 7

      - name: Preparar histórico existente
        run: |
          if git ls-remote --exit-code --heads origin gh-pages; then
            git fetch origin gh-pages
            git worktree add previous-pages gh-pages
          fi
        working-directory: agent

      - name: Montar site com histórico
        run: |
          python scripts/build_pages_site.py \
            --analysis-file ../target/outputs/analysis.md \
            --target-owner "${{ github.event.client_payload.target_owner }}" \
            --target-repo "${{ github.event.client_payload.target_repo }}"
        working-directory: agent

      - name: Remover worktree temporário
        run: |
          if [ -d previous-pages ]; then
            git worktree remove previous-pages --force
          fi
        working-directory: agent

      - name: Preparar branch gh-pages para publicação
        run: |
          mkdir -p publish

          if git ls-remote --exit-code --heads origin gh-pages; then
            git fetch origin gh-pages
            git worktree add publish gh-pages
          else
            git worktree add --detach publish
            cd publish
            git checkout --orphan gh-pages
            git rm -rf . || true
            cd ..
          fi
        working-directory: agent

      - name: Atualizar conteúdo do site publicado
        run: |
          rm -rf publish/*
          cp -R site/* publish/
        working-directory: agent

      - name: Publicar em gh-pages
        run: |
          cd publish
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "docs: update qagent history" || echo "Sem mudanças para commit"
          git push origin gh-pages
        working-directory: agent