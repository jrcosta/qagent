name: QA Agent Review

on:
  repository_dispatch:
    types: [analyze_target_repo]
  workflow_dispatch:
    inputs:
      target_owner:
        description: "Dono do repositório alvo"
        required: true
      target_repo:
        description: "Nome do repositório alvo"
        required: true
      target_ref:
        description: "Ref/SHA para checkout do repositório alvo"
        required: true
      target_branch:
        description: "Branch base do PR no repositório alvo"
        required: true
      base_sha:
        description: "Commit base para análise"
        required: true
      head_sha:
        description: "Commit final para análise"
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  qa-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch'

    steps:

      - name: Debug payload
        env:
          TARGET_OWNER: ${{ github.event.client_payload.target_owner || inputs.target_owner }}
          TARGET_REPO: ${{ github.event.client_payload.target_repo || inputs.target_repo }}
          TARGET_REF: ${{ github.event.client_payload.target_ref || inputs.target_ref }}
          TARGET_BRANCH: ${{ github.event.client_payload.target_branch || inputs.target_branch }}
          BASE_SHA: ${{ github.event.client_payload.base_sha || inputs.base_sha }}
          HEAD_SHA: ${{ github.event.client_payload.head_sha || inputs.head_sha }}
        run: |
          echo "target_owner=$TARGET_OWNER"
          echo "target_repo=$TARGET_REPO"
          echo "target_ref=$TARGET_REF"
          echo "target_branch=$TARGET_BRANCH"
          echo "base_sha=$BASE_SHA"
          echo "head_sha=$HEAD_SHA"

      - name: Checkout do repo do agente
        uses: actions/checkout@v4
        with:
          path: agent
          fetch-depth: 0

      - name: Checkout do repo alvo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.target_owner || inputs.target_owner }}/${{ github.event.client_payload.target_repo || inputs.target_repo }}
          ref: ${{ github.event.client_payload.target_ref || inputs.target_ref }}
          path: target
          fetch-depth: 0
          token: ${{ secrets.TARGET_REPO_PAT }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalar dependências do agente
        run: |
          python -m pip install --upgrade pip
          pip install -r agent/requirements.txt

      - name: Executar QAgent contra o repo alvo
        env:
          LLM_PROVIDER: groq
          LLM_MODEL: openai/gpt-4.1-mini
          LLM_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LLM_TEMPERATURE: "0"
          BASE_SHA: ${{ github.event.client_payload.base_sha || inputs.base_sha }}
          HEAD_SHA: ${{ github.event.client_payload.head_sha || inputs.head_sha }}
        run: |
          cd agent
          python -m src.main \
            --repo-path ../target \
            --output-file ../target/outputs/analysis.md \
            --base-sha "$BASE_SHA" \
            --head-sha "$HEAD_SHA" \
            --cooperative-analysis

      - name: Mostrar relatório gerado
        run: |
          cat target/outputs/analysis.md || true

      - name: Executar agente gerador de testes unitários
        env:
          GITHUB_TOKEN: ${{ secrets.TARGET_REPO_PAT }}
          LLM_PROVIDER: groq
          LLM_MODEL: openai/gpt-4.1-mini
          LLM_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LLM_TEMPERATURE: "0"
          TARGET_BRANCH: ${{ github.event.client_payload.target_branch || inputs.target_branch }}
        run: |
          cd agent
          python -m src.main_test_generator \
            --repo-path ../target \
            --report-file ../target/outputs/analysis.md \
            --base-branch "$TARGET_BRANCH"

      - name: Instalar dependências do alvo em venv isolado
        run: |
          python -m venv target-venv
          target-venv/bin/pip install --upgrade pip
          if [ -f target/python-api/requirements.txt ]; then
            target-venv/bin/pip install -r target/python-api/requirements.txt
          elif [ -f target/requirements.txt ]; then
            target-venv/bin/pip install -r target/requirements.txt
          fi
          target-venv/bin/pip install pytest pytest-asyncio

      - name: Executar revisão crítica dos testes (Test Reviewer)
        env:
          GITHUB_TOKEN: ${{ secrets.TARGET_REPO_PAT }}
          LLM_PROVIDER: groq
          LLM_MODEL: openai/gpt-4.1-mini
          LLM_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LLM_TEMPERATURE: "0"
          TARGET_OWNER: ${{ github.event.client_payload.target_owner || inputs.target_owner }}
          TARGET_REPO: ${{ github.event.client_payload.target_repo || inputs.target_repo }}
          BASE_SHA: ${{ github.event.client_payload.base_sha || inputs.base_sha }}
          HEAD_SHA: ${{ github.event.client_payload.head_sha || inputs.head_sha }}
          PYTEST_BIN: ${{ github.workspace }}/target-venv/bin/pytest
        run: |
          set +e
          target_sha="$(git -C target rev-parse HEAD)"

          curl -sf -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${TARGET_OWNER}/${TARGET_REPO}/statuses/${target_sha}" \
            -d "$(jq -n \
              --arg state "pending" \
              --arg context "QAgent Test Review" \
              --arg description "Revisão crítica dos testes gerados em andamento." \
              --arg target_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              '{state: $state, context: $context, description: $description, target_url: $target_url}')"

          cd agent
          export PYTHONPATH=$PYTHONPATH:$(pwd)/../target/python-api

          python -m src.main_test_reviewer \
            --repo-path ../target \
            --artifacts-file ../target/outputs/artifacts.json \
            --base-sha "$BASE_SHA" \
            --head-sha "$HEAD_SHA" \
            --execute-tests \
            --auto-fix-tests \
            --fail-on-findings
          reviewer_exit=$?
          cd ..

          if [ "$reviewer_exit" -eq 0 ]; then
            review_state="success"
            review_description="QAgent aprovou os testes gerados."
          else
            review_state="failure"
            review_description="QAgent encontrou problemas nos testes gerados."
          fi

          curl -sf -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${TARGET_OWNER}/${TARGET_REPO}/statuses/${target_sha}" \
            -d "$(jq -n \
              --arg state "$review_state" \
              --arg context "QAgent Test Review" \
              --arg description "$review_description" \
              --arg target_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              '{state: $state, context: $context, description: $description, target_url: $target_url}')"

          if [ "$reviewer_exit" -ne 0 ]; then
            echo "QAgent Test Review publicou failure no PR alvo; mantendo o workflow do qagent verde."
          fi

      - name: Publicar relatório como artifact
        uses: actions/upload-artifact@v4
        with:
          name: qa-analysis
          path: target/outputs/analysis.md
          retention-days: 7

      - name: Preparar histórico existente
        run: |
          if git ls-remote --exit-code --heads origin gh-pages; then
            git fetch origin gh-pages
            git worktree add previous-pages gh-pages
          fi
        working-directory: agent

      - name: Montar site com histórico
        env:
          TARGET_OWNER: ${{ github.event.client_payload.target_owner || inputs.target_owner }}
          TARGET_REPO: ${{ github.event.client_payload.target_repo || inputs.target_repo }}
        run: |
          python scripts/build_pages_site.py \
            --analysis-file ../target/outputs/analysis.md \
            --target-owner "$TARGET_OWNER" \
            --target-repo "$TARGET_REPO"
        working-directory: agent

      - name: Remover worktree temporário
        run: |
          if [ -d previous-pages ]; then
            git worktree remove previous-pages --force
          fi
        working-directory: agent

      - name: Preparar branch gh-pages para publicação
        run: |
          mkdir -p publish

          if git ls-remote --exit-code --heads origin gh-pages; then
            git fetch origin gh-pages
            git worktree add publish gh-pages
          else
            git worktree add --detach publish
            cd publish
            git checkout --orphan gh-pages
            git rm -rf . || true
            cd ..
          fi
        working-directory: agent

      - name: Atualizar conteúdo do site publicado
        run: |
          rm -rf publish/*
          cp -R site/* publish/
        working-directory: agent

      - name: Publicar em gh-pages
        run: |
          cd publish
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "docs: update qagent history" || echo "Sem mudanças para commit"
          git push origin gh-pages
        working-directory: agent
