name: QA Agent Review

on:
  repository_dispatch:
    types: [analyze_target_repo]
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  qa-review:
    runs-on: ubuntu-latest

    steps:

      - name: Debug payload
        run: |
          echo "target_owner=${{ github.event.client_payload.target_owner }}"
          echo "target_repo=${{ github.event.client_payload.target_repo }}"
          echo "target_ref=${{ github.event.client_payload.target_ref }}"
          echo "target_branch=${{ github.event.client_payload.target_branch }}"
          echo "base_sha=${{ github.event.client_payload.base_sha }}"
          echo "head_sha=${{ github.event.client_payload.head_sha }}"

      - name: Definir metadados do repositório alvo
        id: target_meta
        shell: bash
        run: |
          EVENT_NAME="${{ github.event_name }}"
          PAYLOAD_OWNER="${{ github.event.client_payload.target_owner }}"
          PAYLOAD_REPO="${{ github.event.client_payload.target_repo }}"
          PAYLOAD_REF="${{ github.event.client_payload.target_ref }}"
          PAYLOAD_BASE_SHA="${{ github.event.client_payload.base_sha }}"
          PAYLOAD_HEAD_SHA="${{ github.event.client_payload.head_sha }}"

          if [ -n "$PAYLOAD_OWNER" ] && [ -n "$PAYLOAD_REPO" ]; then
            TARGET_OWNER="$PAYLOAD_OWNER"
            TARGET_REPO="$PAYLOAD_REPO"
          else
            TARGET_OWNER="${GITHUB_REPOSITORY_OWNER}"
            TARGET_REPO="${GITHUB_REPOSITORY#${GITHUB_REPOSITORY_OWNER}/}"
          fi

          if [ -n "$PAYLOAD_REF" ]; then
            TARGET_REF="$PAYLOAD_REF"
          else
            TARGET_REF="${GITHUB_SHA}"
          fi

          if [ -n "$PAYLOAD_HEAD_SHA" ]; then
            HEAD_SHA="$PAYLOAD_HEAD_SHA"
          else
            HEAD_SHA="${GITHUB_SHA}"
          fi

          if [ -n "$PAYLOAD_BASE_SHA" ]; then
            BASE_SHA="$PAYLOAD_BASE_SHA"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          echo "target_owner=$TARGET_OWNER" >> "$GITHUB_OUTPUT"
          echo "target_repo=$TARGET_REPO" >> "$GITHUB_OUTPUT"
          echo "target_ref=$TARGET_REF" >> "$GITHUB_OUTPUT"
          echo "base_sha=$BASE_SHA" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"

      - name: Checkout do repo do agente
        uses: actions/checkout@v4
        with:
          path: agent
          fetch-depth: 0

      - name: Checkout do repo alvo
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.target_meta.outputs.target_owner }}/${{ steps.target_meta.outputs.target_repo }}
          ref: ${{ steps.target_meta.outputs.target_ref }}
          path: target
          fetch-depth: 0
          token: ${{ secrets.TARGET_REPO_PAT }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências do agente
        run: |
          python -m pip install --upgrade pip
          pip install -r agent/requirements.txt

      - name: Criar arquivo .env do agente
        run: |
          # Use printf to avoid edge-cases where echo could interpret
          # special characters or truncate the secret. This writes the
          # .env file in a robust, literal-safe way.
          mkdir -p agent
          {
            printf 'LLM_PROVIDER=%s\n' "groq"
            printf 'LLM_MODEL=%s\n' "groq/llama-3.3-70b-versatile"
            printf 'LLM_API_KEY=%s\n' "${{ secrets.GROQ_API_KEY }}"
            printf 'LLM_TEMPERATURE=%s\n' "0"
          } >> agent/.env

      - name: Executar QAgent contra o repo alvo
        run: |
          cd agent
          python -m src.main \
            --repo-path ../target \
            --output-file ../target/outputs/analysis.md \
            --base-sha "${{ steps.target_meta.outputs.base_sha }}" \
            --head-sha "${{ steps.target_meta.outputs.head_sha }}"

      - name: Mostrar relatório gerado
        run: |
          cat target/outputs/analysis.md || true

      - name: Publicar relatório como artifact
        uses: actions/upload-artifact@v4
        with:
          name: qa-analysis-${{ steps.target_meta.outputs.target_owner }}-${{ steps.target_meta.outputs.target_repo }}
          path: target/outputs/analysis.md
          retention-days: 7

      - name: Preparar histórico existente
        run: |
          if git ls-remote --exit-code --heads origin gh-pages; then
            git fetch origin gh-pages
            git worktree add previous-pages gh-pages
          fi
        working-directory: agent

      - name: Montar site com histórico
        run: |
          python scripts/build_pages_site.py \
            --analysis-file ../target/outputs/analysis.md \
            --repo-owner "${{ steps.target_meta.outputs.target_owner }}" \
            --repo-name "${{ steps.target_meta.outputs.target_repo }}" \
            --base-sha "${{ steps.target_meta.outputs.base_sha }}" \
            --head-sha "${{ steps.target_meta.outputs.head_sha }}"
        working-directory: agent

      - name: Remover worktree temporário
        run: |
          if [ -d previous-pages ]; then
            git worktree remove previous-pages --force
          fi
        working-directory: agent

      - name: Preparar branch gh-pages para publicação
        run: |
          mkdir -p publish

          if git ls-remote --exit-code --heads origin gh-pages; then
            git fetch origin gh-pages
            git worktree add publish gh-pages
          else
            git worktree add --detach publish
            cd publish
            git checkout --orphan gh-pages
            git rm -rf . || true
            cd ..
          fi
        working-directory: agent

      - name: Atualizar conteúdo do site publicado
        run: |
          rm -rf publish/*
          cp -R site/* publish/
        working-directory: agent

      - name: Publicar em gh-pages
        run: |
          cd publish
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "docs: update qagent history" || echo "Sem mudanças para commit"
          git push origin gh-pages
        working-directory: agent
