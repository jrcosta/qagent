name: QA Agent Review

on:
  repository_dispatch:
    types: [analyze_target_repo]
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  qa-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Criar arquivo .env
        run: |
          echo "LLM_PROVIDER=groq" >> .env
          echo "LLM_MODEL=groq/llama-3.3-70b-versatile" >> .env
          echo "LLM_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env
          echo "LLM_TEMPERATURE=0" >> .env

      - name: Executar QAgent
        run: |
          python -m src.main

      - name: Publicar relatório
        uses: actions/upload-artifact@v4
        with:
          name: qa-analysis
          path: outputs/analysis.md
          retention-days: 7
