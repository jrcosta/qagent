name: QAgent Pages History

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-history-site:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Criar arquivo .env
        run: |
          echo "LLM_PROVIDER=groq" >> .env
          echo "LLM_MODEL=groq/llama-3.3-70b-versatile" >> .env
          echo "LLM_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env
          echo "LLM_TEMPERATURE=0" >> .env

      - name: Executar agente
        run: |
          python -m src.main

      - name: Baixar histórico atual da branch gh-pages
        run: |
          mkdir -p previous-pages
          if git ls-remote --exit-code --heads origin gh-pages; then
            git fetch origin gh-pages
            git worktree add previous-pages gh-pages
          fi

      - name: Montar site com histórico
        run: |
          python scripts/build_pages_site.py

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Upload do site para Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4